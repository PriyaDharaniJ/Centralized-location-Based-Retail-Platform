<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6366f1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="RetailHub Admin">
<link rel="manifest" href="../manifest.json">
<title>RetailHub – Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── THEME 1: LIGHT (white + indigo) ── */
:root{
  --bg:#f8fafc;--surface:#ffffff;--surface2:#f1f5f9;--surface3:#e2e8f0;
  --accent:#6366f1;--accent2:#818cf8;--text:#1e293b;--muted:#64748b;
  --green:#16a34a;--red:#dc2626;--blue:#2563eb;--yellow:#d97706;
  --border:#e2e8f0;--radius:14px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.05);
}

/* ── THEME 2: MID (slate grey + indigo) ── */
[data-theme="mid"]{
  --bg:#1e2433;--surface:#28304a;--surface2:#323c58;--surface3:#3d4968;
  --accent:#818cf8;--accent2:#a5b4fc;--text:#e2e8f0;--muted:#94a3b8;
  --green:#22c55e;--red:#ef4444;--blue:#60a5fa;--yellow:#fbbf24;
  --border:#3d4968;--radius:14px;--shadow:0 4px 20px rgba(0,0,0,.3);
}

/* ── THEME 3: DARK (black + indigo) ── */
[data-theme="dark"]{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--surface3:#282828;
  --accent:#6366f1;--accent2:#818cf8;--text:#f1f5f9;--muted:#64748b;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--yellow:#eab308;
  --border:#1e1e1e;--radius:14px;--shadow:0 4px 24px rgba(0,0,0,.4);
}

body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
h1,h2,h3{font-family:'Syne',sans-serif}

/* Theme toggle */
.theme-toggle-btn{position:fixed;bottom:80px;right:16px;z-index:400;width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;background:var(--accent);color:#fff;font-size:1.2rem;box-shadow:0 4px 16px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;transition:.3s}
.theme-toggle-btn:hover{transform:scale(1.1)}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:20px;display:flex;flex-direction:column;position:fixed;height:100vh;overflow-y:auto}
.main{margin-left:220px;flex:1;padding:28px;max-width:1200px}
.brand{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:var(--accent);padding:8px 0 24px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;margin-bottom:4px;color:var(--muted);font-weight:500;font-size:.88rem;transition:.15s}
.nav-item:hover,.nav-item.active{background:rgba(99,102,241,.12);color:var(--accent)}
.nav-icon{font-size:1rem;width:22px;text-align:center}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.page-header h2{font-size:1.5rem;font-weight:800}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.stat-icon{font-size:1.8rem;margin-bottom:10px}
.stat-value{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:4px}
.stat-label{font-size:.78rem;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.stat-accent .stat-value{color:var(--accent)}.stat-green .stat-value{color:var(--green)}.stat-yellow .stat-value{color:var(--yellow)}.stat-blue .stat-value{color:var(--blue)}
.table-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:24px}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.table-header h3{font-size:.95rem;font-weight:700}
table{width:100%;border-collapse:collapse}
th{padding:12px 16px;text-align:left;font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;background:var(--surface2);border-bottom:1px solid var(--border)}
td{padding:13px 16px;font-size:.85rem;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:700}
.badge-green{background:rgba(34,197,94,.15);color:var(--green)}
.badge-yellow{background:rgba(234,179,8,.15);color:var(--yellow)}
.badge-red{background:rgba(239,68,68,.15);color:var(--red)}
.badge-blue{background:rgba(59,130,246,.15);color:var(--blue)}
.btn{padding:7px 14px;border-radius:9px;border:none;cursor:pointer;font-weight:600;font-size:.8rem;transition:.15s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}.btn-outline:hover{background:var(--surface2)}
.btn-green{background:var(--green);color:#fff}.btn-red{background:var(--red);color:#fff}
.btn-sm{padding:4px 10px;font-size:.75rem}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:500px;position:relative;box-shadow:var(--shadow)}
.modal-close{position:absolute;top:16px;right:16px;background:var(--surface2);border:none;color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.82rem;color:var(--muted);margin-bottom:5px;font-weight:600}
.form-group input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-size:.9rem;outline:none;font-family:inherit}
.form-group input:focus{border-color:var(--accent)}
.form-error{color:var(--red);font-size:.83rem;margin-top:8px}
.toast-container{position:fixed;bottom:20px;right:20px;z-index:500;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:10px;font-size:.88rem;font-weight:500;animation:toastIn .3s ease;box-shadow:var(--shadow)}
.toast.success{background:var(--green);color:#fff}.toast.error{background:var(--red);color:#fff}.toast.info{background:var(--blue);color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page{display:none}.page.active{display:block}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,.15) 0%,transparent 60%),var(--bg)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:380px;box-shadow:var(--shadow);text-align:center}
.revenue-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin-top:8px}
.revenue-fill{background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .6s ease}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:768px){
  .sidebar{width:64px;padding:12px}
  .sidebar .brand,.sidebar .nav-item span:not(.nav-icon),.sidebar-footer{display:none}
  .main{margin-left:64px}
}
@media(max-width:480px){
  .sidebar{
    width:100%;height:58px;position:fixed;bottom:0;top:auto;
    flex-direction:row;padding:0;border-right:none;border-top:1px solid var(--border);
  }
  .sidebar-nav{flex-direction:row;width:100%;justify-content:space-around;padding:4px 0}
  .brand,.sidebar-footer{display:none}
  .nav-item{padding:6px 10px;border-radius:8px}
  .nav-item span:not(.nav-icon){display:none}
  .main{margin-left:0;padding-bottom:66px}
  .topbar{padding:10px 12px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:480px}
  .modal-overlay{padding:0;align-items:flex-end}
  .modal{border-radius:20px 20px 0 0;max-height:90vh;padding:20px 16px;max-width:100%}
  .auth-card{padding:28px 20px;margin:12px}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <div style="font-size:2.5rem;margin-bottom:8px">🛡️</div>
    <div style="font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--accent);margin-bottom:4px">Admin Portal</div>
    <div style="color:var(--muted);font-size:.85rem;margin-bottom:28px">RetailHub — Dindigul District</div>
    <div class="form-group" style="text-align:left"><label>Email</label><input type="email" id="loginEmail" placeholder="admin@retailplatform.com"></div>
    <div class="form-group" style="text-align:left"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••"></div>
    <div class="form-error" id="loginError" style="margin-bottom:10px"></div>
    <button class="btn btn-primary" style="width:100%;padding:12px;font-size:.95rem" onclick="doLogin()">Login as Admin</button>
    <div style="margin-top:14px;font-size:.78rem;color:var(--muted)">Default: admin@retailplatform.com / admin123</div>
  </div>
</div>

<!-- MAIN APP -->
<div class="app" id="mainApp" style="display:none">
  <aside class="sidebar">
    <div class="brand">⚡ RetailHub</div>
    <nav>
      <div class="nav-item active" onclick="showPage('dashboard')"><span class="nav-icon">📊</span>Dashboard</div>
      <div class="nav-item" onclick="showPage('retailers')"><span class="nav-icon">🏪</span>Retailers</div>
      <div class="nav-item" onclick="showPage('pending')"><span class="nav-icon">⏳</span>Pending <span id="pendingCount" style="background:var(--red);color:#fff;border-radius:20px;padding:1px 7px;font-size:.7rem;margin-left:auto"></span></div>
      <div class="nav-item" onclick="showPage('revenue')"><span class="nav-icon">💰</span>Revenue</div>
    </nav>
    <div style="margin-top:auto;padding-top:20px">
      <button class="btn btn-outline" style="width:100%" onclick="doLogout()">Logout</button>
    </div>
  </aside>

  <main class="main">
    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <div class="page-header">
        <h2>Admin Dashboard</h2>
        <button class="btn btn-outline btn-sm" onclick="loadAll()">🔄 Refresh</button>
      </div>
      <div class="stats-grid" id="statsGrid"><div class="spinner" style="grid-column:1/-1"></div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <div class="table-container">
          <div class="table-header"><h3>⏳ Pending Approvals</h3></div>
          <div id="pendingTable"><div class="spinner"></div></div>
        </div>
        <div class="table-container">
          <div class="table-header"><h3>🏆 Top Retailers</h3></div>
          <div id="topRetailersTable"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- RETAILERS -->
    <div class="page" id="page-retailers">
      <div class="page-header"><h2>All Retailers</h2></div>
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <input id="retailerSearch" placeholder="Search by shop name..." style="flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:10px;outline:none;font-size:.88rem" oninput="filterRetailers()">
        <select id="retailerFilter" style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:10px;outline:none;font-size:.88rem" onchange="filterRetailers()">
          <option value="ALL">All</option>
          <option value="APPROVED">Approved</option>
          <option value="PENDING">Pending</option>
        </select>
      </div>
      <div class="table-container"><div id="retailersTable"><div class="spinner"></div></div></div>
    </div>

    <!-- PENDING -->
    <div class="page" id="page-pending">
      <div class="page-header"><h2>Pending Approvals</h2></div>
      <div class="table-container"><div id="pendingFullTable"><div class="spinner"></div></div></div>
    </div>

    <!-- REVENUE -->
    <div class="page" id="page-revenue">
      <div class="page-header"><h2>Revenue & Earnings</h2></div>
      <div class="stats-grid" id="revenueStats"></div>
      <div class="table-container">
        <div class="table-header"><h3>Retailer-wise Revenue</h3></div>
        <div id="revenueTable"><div class="spinner"></div></div>
      </div>
    </div>
  </main>
</div>

<!-- RETAILER DETAIL MODAL -->
<div class="modal-overlay" id="retailerModal">
  <div class="modal" style="max-width:560px">
    <button class="modal-close" onclick="closeModal('retailerModal')">✕</button>
    <div id="retailerModalContent"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- THEME TOGGLE -->
<button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()" title="Switch Theme">🌙</button>

<script>
const API = 'https://centralized-location-based-retail.onrender.com/api';
let S = { admin:null, token:null, dashData:null, retailers:[] };

function h() {
  const headers = {'Content-Type':'application/json'};
  if (S.token) headers['Authorization'] = 'Bearer ' + S.token;
  return headers;
}
async function get(path) { return (await fetch(API+path, {headers:h()})).json(); }
async function post(path, data={}) { return (await fetch(API+path, {method:'POST',headers:h(),body:JSON.stringify(data)})).json(); }

window.onload = () => {
  const u = JSON.parse(localStorage.getItem('rp_admin') || 'null');
  const t = localStorage.getItem('rp_admin_token');
  if (u && t) { S.admin = u; S.token = t; bootApp(); }
};

async function doLogin() {
  const email = document.getElementById('loginEmail').value;
  const pw = document.getElementById('loginPassword').value;
  document.getElementById('loginError').textContent = '';
  try {
    const r = await fetch(`${API}/auth/login`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw,role:'ADMIN'})});
    const data = await r.json();
    if (data.success) {
      S.admin = data.data; S.token = data.data.token;
      localStorage.setItem('rp_admin_token', data.data.token);
      localStorage.setItem('rp_admin', JSON.stringify(data.data));
      bootApp();
    } else { document.getElementById('loginError').textContent = data.message; }
  } catch(e) { document.getElementById('loginError').textContent = 'Login failed. Check server.'; }
}

function bootApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'flex';
  loadAll();
}

async function loadAll() {
  try {
    const r = await get('/admin/dashboard');
    S.dashData = r.data;
    S.retailers = S.dashData.retailers || [];
    renderDashboard();
    renderRetailersTable(S.retailers);
    renderPendingTable(S.dashData);
    renderRevenueTable();
    const pendingCount = S.dashData.pendingRetailers || 0;
    document.getElementById('pendingCount').textContent = pendingCount > 0 ? pendingCount : '';
  } catch(e) { toast('Failed to load data. Is the backend running?', 'error'); }
}

function renderDashboard() {
  const d = S.dashData;
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card stat-accent"><div class="stat-icon">🏪</div><div class="stat-value">${d.totalRetailers||0}</div><div class="stat-label">Total Shops</div></div>
    <div class="stat-card stat-green"><div class="stat-icon">✅</div><div class="stat-value">${d.approvedRetailers||0}</div><div class="stat-label">Approved</div></div>
    <div class="stat-card stat-yellow"><div class="stat-icon">⏳</div><div class="stat-value">${d.pendingRetailers||0}</div><div class="stat-label">Pending</div></div>
    <div class="stat-card stat-blue"><div class="stat-icon">👥</div><div class="stat-value">${d.totalUsers||0}</div><div class="stat-label">Customers</div></div>
    <div class="stat-card stat-accent"><div class="stat-icon">📋</div><div class="stat-value">${d.totalOrders||0}</div><div class="stat-label">Total Orders</div></div>
    <div class="stat-card stat-green"><div class="stat-icon">💰</div><div class="stat-value">₹${Math.round(d.totalRevenue||0).toLocaleString()}</div><div class="stat-label">Platform Revenue</div></div>
    <div class="stat-card stat-accent"><div class="stat-icon">🏦</div><div class="stat-value">₹${Math.round(d.totalCommission||0).toLocaleString()}</div><div class="stat-label">Total Commission</div></div>`;

  // Pending table
  const pending = S.retailers.filter(r => !r.isApproved);
  document.getElementById('pendingTable').innerHTML = pending.length ? `
    <table><thead><tr><th>Shop</th><th>Owner</th><th>Action</th></tr></thead>
    <tbody>${pending.slice(0,5).map(r=>`<tr>
      <td><strong>${r.shopName}</strong><br><span style="color:var(--muted);font-size:.75rem">${r.shopCategory}</span></td>
      <td>${r.name}<br><span style="color:var(--muted);font-size:.75rem">${r.phone}</span></td>
      <td><button class="btn btn-green btn-sm" onclick="approveRetailer(${r.id})">Approve</button> <button class="btn btn-red btn-sm" onclick="rejectRetailer(${r.id})">Reject</button></td>
    </tr>`).join('')}</tbody></table>` :
    '<div class="empty-state"><p>No pending approvals 🎉</p></div>';

  // Top retailers
  const approved = S.retailers.filter(r => r.isApproved).sort((a,b) => (b.totalRevenue||0)-(a.totalRevenue||0));
  document.getElementById('topRetailersTable').innerHTML = approved.length ? `
    <table><thead><tr><th>Shop</th><th>Revenue</th><th>Orders</th></tr></thead>
    <tbody>${approved.slice(0,5).map(r=>`<tr>
      <td><strong>${r.shopName}</strong><br><span style="color:var(--muted);font-size:.75rem">${r.shopCategory}</span></td>
      <td style="color:var(--green);font-weight:700">₹${Math.round(r.totalRevenue||0).toLocaleString()}</td>
      <td>${r.totalOrders||0}</td>
    </tr>`).join('')}</tbody></table>` :
    '<div class="empty-state"><p>No approved retailers yet</p></div>';
}

function renderRetailersTable(retailers) {
  document.getElementById('retailersTable').innerHTML = retailers.length ? `
    <table>
      <thead><tr><th>Shop Name</th><th>Owner</th><th>Category</th><th>Status</th><th>Revenue</th><th>Orders</th><th>Actions</th></tr></thead>
      <tbody>${retailers.map(r=>`<tr>
        <td><strong>${r.shopName}</strong><br><span style="color:var(--muted);font-size:.75rem">${r.shopAddress.substring(0,30)}...</span></td>
        <td>${r.name}<br><span style="color:var(--muted);font-size:.75rem">${r.phone}</span></td>
        <td>${r.shopCategory}</td>
        <td>
          <span class="badge ${r.isApproved?'badge-green':'badge-yellow'}">${r.isApproved?'✅ Approved':'⏳ Pending'}</span><br>
          <span style="font-size:.72rem;color:var(--muted)">${r.isOpen?'🟢 Open':'🔴 Closed'}</span>
        </td>
        <td style="color:var(--green);font-weight:700">₹${Math.round(r.totalRevenue||0).toLocaleString()}</td>
        <td>${r.totalOrders||0}</td>
        <td>
          <button class="btn btn-outline btn-sm" onclick="viewRetailer(${r.id})">View</button>
          ${!r.isApproved?`<button class="btn btn-green btn-sm" onclick="approveRetailer(${r.id})" style="margin-left:4px">Approve</button>`:''}
        </td>
      </tr>`).join('')}
      </tbody>
    </table>` :
    '<div class="empty-state"><p>No retailers found</p></div>';
}

function filterRetailers() {
  const q = document.getElementById('retailerSearch').value.toLowerCase();
  const filter = document.getElementById('retailerFilter').value;
  let filtered = S.retailers.filter(r => r.shopName.toLowerCase().includes(q) || r.name.toLowerCase().includes(q));
  if (filter === 'APPROVED') filtered = filtered.filter(r => r.isApproved);
  if (filter === 'PENDING') filtered = filtered.filter(r => !r.isApproved);
  renderRetailersTable(filtered);
}

function renderPendingTable(data) {
  const pending = S.retailers.filter(r => !r.isApproved);
  document.getElementById('pendingFullTable').innerHTML = pending.length ? `
    <table>
      <thead><tr><th>Shop</th><th>Owner</th><th>Phone</th><th>Category</th><th>Location</th><th>Registered</th><th>Actions</th></tr></thead>
      <tbody>${pending.map(r=>`<tr>
        <td><strong>${r.shopName}</strong><br><span style="color:var(--muted);font-size:.75rem">${r.shopAddress}</span></td>
        <td>${r.name}</td>
        <td><a href="tel:${r.phone}" style="color:var(--accent)">${r.phone}</a></td>
        <td>${r.shopCategory}</td>
        <td style="font-size:.78rem;color:var(--muted)">${r.latitude?.toFixed(4)}, ${r.longitude?.toFixed(4)}</td>
        <td style="font-size:.78rem;color:var(--muted)">${new Date(r.createdAt).toLocaleDateString('en-IN')}</td>
        <td>
          <button class="btn btn-green btn-sm" onclick="approveRetailer(${r.id})">✅ Approve</button>
          <button class="btn btn-red btn-sm" onclick="rejectRetailer(${r.id})" style="margin-left:4px">❌ Reject</button>
        </td>
      </tr>`).join('')}
      </tbody>
    </table>` :
    '<div class="empty-state"><div class="empty-icon" style="font-size:2.5rem">🎉</div><p>All shops approved!</p></div>';
}

function renderRevenueTable() {
  const d = S.dashData;
  document.getElementById('revenueStats').innerHTML = `
    <div class="stat-card stat-green"><div class="stat-icon">💰</div><div class="stat-value">₹${Math.round(d.totalRevenue||0).toLocaleString()}</div><div class="stat-label">Total Platform GMV</div></div>
    <div class="stat-card stat-accent"><div class="stat-icon">🏦</div><div class="stat-value">₹${Math.round(d.totalCommission||0).toLocaleString()}</div><div class="stat-label">Admin Commission Earned</div></div>
    <div class="stat-card stat-blue"><div class="stat-icon">📋</div><div class="stat-value">${d.totalOrders||0}</div><div class="stat-label">Total Orders Placed</div></div>`;

  const retailers = S.retailers.filter(r => r.isApproved).sort((a,b) => (b.totalRevenue||0)-(a.totalRevenue||0));
  const maxRev = Math.max(...retailers.map(r => r.totalRevenue||0), 1);
  document.getElementById('revenueTable').innerHTML = retailers.length ? `
    <table>
      <thead><tr><th>Shop</th><th>Category</th><th>Revenue</th><th>Commission (${S.retailers[0]?.commissionRate||5}%)</th><th>Orders</th><th>Performance</th></tr></thead>
      <tbody>${retailers.map(r=>`<tr>
        <td><strong>${r.shopName}</strong><br><span style="color:var(--muted);font-size:.75rem">${r.email}</span></td>
        <td>${r.shopCategory}</td>
        <td style="color:var(--green);font-weight:700">₹${Math.round(r.totalRevenue||0).toLocaleString()}</td>
        <td style="color:var(--accent);font-weight:700">₹${Math.round((r.totalRevenue||0)*(r.commissionRate||5)/100).toLocaleString()}</td>
        <td>${r.totalOrders||0}</td>
        <td style="min-width:100px">
          <div style="font-size:.72rem;color:var(--muted);margin-bottom:4px">${((r.totalRevenue||0)/maxRev*100).toFixed(0)}%</div>
          <div class="revenue-bar"><div class="revenue-fill" style="width:${((r.totalRevenue||0)/maxRev*100)}%"></div></div>
        </td>
      </tr>`).join('')}
      </tbody>
    </table>` :
    '<div class="empty-state"><p>No revenue data yet</p></div>';
}

function viewRetailer(id) {
  const r = S.retailers.find(r => r.id === id);
  if (!r) return;
  document.getElementById('retailerModalContent').innerHTML = `
    <h2 style="font-size:1.2rem;margin-bottom:16px">${r.shopName}</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;font-size:.85rem">
      <div style="padding:10px;background:var(--surface2);border-radius:8px"><div style="color:var(--muted);font-size:.75rem">Owner</div><strong>${r.name}</strong></div>
      <div style="padding:10px;background:var(--surface2);border-radius:8px"><div style="color:var(--muted);font-size:.75rem">Phone</div><a href="tel:${r.phone}" style="color:var(--accent);font-weight:700">${r.phone}</a></div>
      <div style="padding:10px;background:var(--surface2);border-radius:8px"><div style="color:var(--muted);font-size:.75rem">Email</div><strong>${r.email}</strong></div>
      <div style="padding:10px;background:var(--surface2);border-radius:8px"><div style="color:var(--muted);font-size:.75rem">Category</div><strong>${r.shopCategory}</strong></div>
      <div style="padding:10px;background:var(--surface2);border-radius:8px;grid-column:1/-1"><div style="color:var(--muted);font-size:.75rem">Address</div><strong>${r.shopAddress}</strong></div>
      <div style="padding:10px;background:var(--surface2);border-radius:8px"><div style="color:var(--muted);font-size:.75rem">Status</div><span class="badge ${r.isApproved?'badge-green':'badge-yellow'}">${r.isApproved?'✅ Approved':'⏳ Pending'}</span></div>
      <div style="padding:10px;background:var(--surface2);border-radius:8px"><div style="color:var(--muted);font-size:.75rem">Shop Open</div><strong>${r.isOpen?'🟢 Open':'🔴 Closed'}</strong></div>
      <div style="padding:10px;background:var(--surface2);border-radius:8px"><div style="color:var(--muted);font-size:.75rem">Revenue</div><strong style="color:var(--green)">₹${Math.round(r.totalRevenue||0).toLocaleString()}</strong></div>
      <div style="padding:10px;background:var(--surface2);border-radius:8px"><div style="color:var(--muted);font-size:.75rem">Commission</div><strong style="color:var(--accent)">₹${Math.round((r.totalRevenue||0)*(r.commissionRate||5)/100).toLocaleString()}</strong></div>
    </div>
    <div style="display:flex;gap:8px">
      ${!r.isApproved?`<button class="btn btn-green" style="flex:1" onclick="approveRetailer(${r.id});closeModal('retailerModal')">✅ Approve Shop</button><button class="btn btn-red" style="flex:1" onclick="rejectRetailer(${r.id});closeModal('retailerModal')">❌ Reject</button>`:'<div style="color:var(--green);font-weight:700;text-align:center;width:100%;padding:10px">✅ Shop Approved</div>'}
    </div>`;
  openModal('retailerModal');
}

async function approveRetailer(id) {
  try {
    const r = await post(`/admin/retailers/${id}/approve`);
    if (r.success) { toast('Shop approved! Retailer notified.', 'success'); loadAll(); }
    else { toast(r.message, 'error'); }
  } catch(e) { toast('Failed to approve', 'error'); }
}

async function rejectRetailer(id) {
  if (!confirm('Reject this retailer?')) return;
  try {
    const r = await post(`/admin/retailers/${id}/reject`);
    if (r.success) { toast('Retailer rejected', 'info'); loadAll(); }
    else { toast(r.message, 'error'); }
  } catch(e) { toast('Failed to reject', 'error'); }
}

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const idx = {dashboard:0,retailers:1,pending:2,revenue:3};
  if (idx[page]!==undefined) document.querySelectorAll('.nav-item')[idx[page]].classList.add('active');
  if (page==='pending') renderPendingTable(S.dashData);
  if (page==='revenue') renderRevenueTable();
  if (page==='retailers') renderRetailersTable(S.retailers);
}

function doLogout() {
  S.admin=null; S.token=null;
  localStorage.removeItem('rp_admin'); localStorage.removeItem('rp_admin_token');
  document.getElementById('mainApp').style.display='none';
  document.getElementById('authScreen').style.display='flex';
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => m.addEventListener('click', e => { if(e.target===m) m.classList.remove('open'); }));

// ── THEME TOGGLE (3 themes: light → mid → dark) ──
const THEMES = ['light','mid','dark'];
const THEME_ICONS = {light:'🌤️', mid:'🌓', dark:'🌙'};
const THEME_TIPS  = {light:'Switch to Mid Theme', mid:'Switch to Dark Theme', dark:'Switch to Light Theme'};
function applyTheme(theme) {
  if (theme === 'light') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('rp_admin_theme', theme);
  const btn = document.getElementById('themeToggleBtn');
  if (btn) { btn.textContent = THEME_ICONS[theme]; btn.title = THEME_TIPS[theme]; }
}
function toggleTheme() {
  const cur = localStorage.getItem('rp_admin_theme') || 'light';
  applyTheme(THEMES[(THEMES.indexOf(cur)+1) % THEMES.length]);
}
(function initTheme(){ applyTheme(localStorage.getItem('rp_admin_theme') || 'light'); })();

function toast(msg, type='info') {
  const t = document.createElement('div');
  t.className=`toast ${type}`; t.textContent=msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
</script>
</body>
</html>
